<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Donor - LifeLink</title>
    <link rel="stylesheet" href="find.css">
    <script src="https://kit.fontawesome.com/32ec5d2307.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <span class="life">Life</span><span class="link">Link</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="find.html">Find Donor</a>
        <a href="register.html">Register</a>
    </nav>

    <div class="nav-btns">
        <a href="register.html" class="btn">Register Now</a>
    </div>
</header>

<!-- FIND DONOR SECTION -->
<section class="find">

    <div class="container">

        <div class="top">
            <div class="badge">
                <i class="fa-solid fa-magnifying-glass"></i> Find a Match
            </div>

            <h1>Find a Blood or Organ Donor</h1>

            <p>
                Search our database of registered donors by blood group,
                organ type, or location.
            </p>
        </div>

        <!-- SEARCH BOX -->
        <div class="card">

            <div class="card-header">
                <div class="icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div>
                    <h3>Search Criteria</h3>
                    <p>Select at least one filter to search</p>
                </div>
            </div>

            <div class="fields">

                <div class="field">
                    <label>Blood Group</label>
                    <select>
                        <option>Any blood group</option>
                        <option>A+</option>
                        <option>B+</option>
                        <option>O+</option>
                        <option>AB+</option>
                    </select>
                </div>

                <div class="field">
                    <label>Organ Type</label>
                    <select>
                        <option>Any organ</option>
                        <option>Kidney</option>
                        <option>Liver</option>
                        <option>Heart</option>
                    </select>
                </div>

                <div class="field">
                    <label>City / Location</label>
                    <select>
                        <option>Any city</option>
                        <option>Delhi</option>
                        <option>Mumbai</option>
                        <option>Bangalore</option>
                    </select>
                </div>

            </div>

            <button class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
                Search Donors
            </button>

        </div>

    </div>

</section>

</body>
</html>
